<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播客知识库</title>
<style>
:root {
  --bg: #0c0c11;
  --surface: #13131c;
  --surface2: #1c1c28;
  --surface3: #22222f;
  --border: #26263a;
  --accent: #6d5dfc;
  --accent-glow: rgba(109,93,252,0.18);
  --text: #e2e2f0;
  --muted: #7070a0;
  --green: #3dd68c;
  --yellow: #f5a623;
  --red: #ff6b6b;
  --tag-bg: rgba(109,93,252,0.12);
  --tag-color: #a89cf7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: rgba(12,12,17,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  font-size: 16px; font-weight: 700; color: var(--text);
  white-space: nowrap; display: flex; align-items: center; gap: 8px;
}
.logo-icon { font-size: 20px; }
.logo-badge {
  font-size: 11px; font-weight: 500;
  color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 999px;
  margin-left: 4px;
}
.search-wrap {
  flex: 1; max-width: 520px; position: relative;
}
#search { 
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px 9px 38px;
  color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 15px; pointer-events: none;
}
.stats-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
  white-space: nowrap;
}
.stats-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* ── Filter Bar ──────────────────────────────────────────── */
.filter-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.chip {
  padding: 4px 12px; border-radius: 999px; font-size: 12px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }
select.filter-sel {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 5px 10px;
  font-size: 12px; cursor: pointer; outline: none;
}
select.filter-sel:focus { border-color: var(--accent); }
.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
#clear-btn {
  margin-left: auto; font-size: 12px; color: var(--muted);
  background: none; border: none; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; transition: color 0.15s;
}
#clear-btn:hover { color: var(--text); }

/* ── Main ────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Episode List ────────────────────────────────────────── */
.list-pane {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  transition: flex 0.3s;
}
.result-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; font-size: 13px;
}
.result-count { color: var(--text); font-weight: 600; }
.result-desc { color: var(--muted); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* ── Card ────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
  cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 10px;
}
.card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.card.selected { border-color: var(--accent); background: var(--surface2); }

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.ep-badge {
  background: var(--tag-bg); color: var(--accent);
  font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
}
.card-title { font-size: 15px; font-weight: 600; line-height: 1.45; }
.card-guest { font-size: 13px; color: var(--muted); }
.card-summary {
  font-size: 13px; color: var(--muted); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.tag { padding: 3px 9px; border-radius: 999px; font-size: 11px; }
.tag.topic { background: var(--tag-bg); color: var(--tag-color); }
.card-date { margin-left: auto; font-size: 11px; color: var(--muted); }

/* ── Empty State ─────────────────────────────────────────── */
.empty {
  grid-column: 1 / -1; text-align: center;
  padding: 80px 20px; color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

/* ── Detail Panel ────────────────────────────────────────── */
.detail-pane {
  width: 0; overflow: hidden;
  border-left: 1px solid transparent;
  transition: width 0.3s cubic-bezier(.4,0,.2,1), border-color 0.3s;
  background: var(--surface);
  flex-shrink: 0;
}
.detail-pane.open {
  width: 400px; border-left-color: var(--border); overflow-y: auto;
}
.detail-inner { padding: 24px; min-width: 400px; }

.detail-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.detail-ep { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
.detail-title { font-size: 20px; font-weight: 700; line-height: 1.35; }
.close-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; width: 28px; height: 28px;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-left: 12px; transition: all 0.15s;
}
.close-btn:hover { color: var(--text); border-color: var(--accent); }

.meta-block {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 18px;
}
.meta-row { display: flex; gap: 10px; font-size: 13px; padding: 3px 0; }
.meta-key { color: var(--muted); width: 44px; flex-shrink: 0; }
.meta-val { color: var(--text); }

.section { margin-bottom: 20px; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px;
}
.summary-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

.concepts { display: flex; flex-wrap: wrap; gap: 6px; }
.concept {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text);
}

.tag-rows { display: flex; flex-direction: column; gap: 6px; }
.tag-row { display: flex; align-items: flex-start; gap: 8px; }
.tag-ns { font-size: 11px; color: var(--muted); width: 42px; padding-top: 3px; flex-shrink: 0; }
.tag-vals { display: flex; flex-wrap: wrap; gap: 4px; }

.quality-row { display: flex; gap: 12px; }
.q-item { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.q-ok { color: var(--green); }
.q-no { color: var(--border); }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Loading ─────────────────────────────────────────────── */
.loading {
  grid-column: 1 / -1; text-align: center; padding: 60px;
  color: var(--muted); font-size: 14px;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🎙</span>
    播客知识库
    <span class="logo-badge" id="podcast-badge">加载中…</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="search" placeholder="搜索标题、摘要、关键概念、正文…" autocomplete="off">
  </div>
  <div class="stats-badge" id="stats-badge">
    <span class="stats-dot"></span>
    <span id="stats-text"></span>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">人物</span>
    <select id="person-sel" class="filter-sel"><option value="">全部</option></select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">话题</span>
    <select id="topic-sel" class="filter-sel"><option value="">全部</option></select>
  </div>
  <button id="clear-btn">清除筛选</button>
</div>

<div class="main">
  <div class="list-pane" id="list-pane">
    <div class="result-bar">
      <span class="result-count" id="result-count">—</span>
      <span class="result-desc" id="result-desc">集</span>
    </div>
    <div class="grid" id="grid"><div class="loading">加载数据中…</div></div>
  </div>
  <div class="detail-pane" id="detail-pane">
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────
const S = { text: '', person: '', topic: '', selected: null };
let ALL = { episodes: [], people: {}, podcasts: {} };

// ── Label maps ──────────────────────────────────────────────
const TOPIC_LABEL = {
  investment: '投资', 'investment-edu': '投资教育', cognition: '认知',
  'knowledge-system': '知识体系', philosophy: '哲学', 'life-attitude': '人生态度',
  'mental-health': '心理健康', 'self-awareness': '自我认知', 'long-termism': '长期主义',
  entrepreneurship: '创业', ai: 'AI', 'human-machine': '人机关系',
  'time-management': '时间管理', adaptation: '适应与坚守', expression: '表达与存在',
};
const NS_LABEL = { topic: '话题', format: '形式', mood: '场景' };

const tl = t => TOPIC_LABEL[t] || t;
const nl = n => NS_LABEL[n] || n;

function dur(s) {
  if (!s) return '';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? `${h}h${String(m).padStart(2,'0')}m` : `${m}m`;
}

// ── Bootstrap ───────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/data');
  ALL = await res.json();

  // Podcast badge
  const p = Object.values(ALL.podcasts)[0];
  if (p) {
    document.getElementById('podcast-badge').textContent = p.name;
    document.getElementById('stats-text').textContent =
      `已整理 ${ALL.episodes.length} / ${p.total_episodes} 集`;
  }

  // Build person select
  const psel = document.getElementById('person-sel');
  Object.values(ALL.people).sort((a,b) => a.name.localeCompare(b.name,'zh')).forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.name;
    psel.appendChild(o);
  });

  // Build topic select
  const tsel = document.getElementById('topic-sel');
  const topics = new Set();
  ALL.episodes.forEach(e => e.tags.filter(t => t.startsWith('topic:')).forEach(t => topics.add(t.slice(6))));
  [...topics].sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = tl(t);
    tsel.appendChild(o);
  });

  // Event listeners
  document.getElementById('search').addEventListener('input', e => { S.text = e.target.value; render(); });
  psel.addEventListener('change', e => { S.person = e.target.value; render(); });
  tsel.addEventListener('change', e => { S.topic = e.target.value; render(); });
  document.getElementById('clear-btn').addEventListener('click', clearAll);

  render();
}

function clearAll() {
  S.text = ''; S.person = ''; S.topic = ''; S.selected = null;
  document.getElementById('search').value = '';
  document.getElementById('person-sel').value = '';
  document.getElementById('topic-sel').value = '';
  document.getElementById('detail-pane').classList.remove('open');
  render();
}

// ── Filter ──────────────────────────────────────────────────
function filtered() {
  return ALL.episodes.filter(e => {
    if (S.person && !e.host_ids.includes(S.person) && !e.guest_ids.includes(S.person)) return false;
    if (S.topic && !e.tags.includes(`topic:${S.topic}`)) return false;
    if (S.text) {
      const q = S.text.toLowerCase();
      return e.title.toLowerCase().includes(q)
        || e.summary.toLowerCase().includes(q)
        || e.key_concepts.some(c => c.toLowerCase().includes(q))
        || e.body.toLowerCase().includes(q);
    }
    return true;
  });
}

// ── Render ──────────────────────────────────────────────────
function render() {
  const results = filtered();
  document.getElementById('result-count').textContent = results.length;

  const active = [S.person && `人物:${ALL.people[S.person]?.name}`,
                  S.topic && `话题:${tl(S.topic)}`, S.text && `"${S.text}"`].filter(Boolean);
  document.getElementById('result-desc').textContent = active.length ? `集  ·  ${active.join('  ·  ')}` : '集';

  const grid = document.getElementById('grid');
  if (!results.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>未找到匹配结果</p></div>`;
    return;
  }
  grid.innerHTML = results.map(cardHTML).join('');
  grid.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => showDetail(c.dataset.id))
  );
  if (S.selected) {
    const el = grid.querySelector(`[data-id="${S.selected}"]`);
    if (el) el.classList.add('selected');
  }
}

function cardHTML(e) {
  const guests = e.guest_ids.map(id => ALL.people[id]?.name || id).join(' · ');
  const topics = e.tags.filter(t => t.startsWith('topic:')).slice(0, 3)
    .map(t => `<span class="tag topic">${tl(t.slice(6))}</span>`).join('');
  const sel = S.selected === e.id ? ' selected' : '';
  return `
    <div class="card${sel}" data-id="${e.id}">
      <div class="card-top">
        <span class="ep-badge">E${e.episode_number}</span>
        <div class="card-title">${e.title}</div>
      </div>
      ${guests ? `<div class="card-guest">🎤 ${guests}</div>` : ''}
      <div class="card-summary">${e.summary || ''}</div>
      <div class="card-footer">
        ${topics}
        <span class="card-date">${e.air_date}${dur(e.duration_seconds) ? ' · ' + dur(e.duration_seconds) : ''}</span>
      </div>
    </div>`;
}

// ── Detail Panel ────────────────────────────────────────────
function showDetail(id) {
  const e = ALL.episodes.find(ep => ep.id === id);
  if (!e) return;
  S.selected = id;

  document.querySelectorAll('.card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));

  const hosts = e.host_ids.map(id => ALL.people[id]?.name || id).join(', ');
  const guests = e.guest_ids.map(id => ALL.people[id]?.name || id).join(', ');
  const podcast = ALL.podcasts[e.podcast_id];

  // Tags by namespace
  const ns = {};
  e.tags.forEach(t => {
    const [n, v] = t.split(':', 2);
    (ns[n] = ns[n] || []).push(v);
  });
  const tagsHTML = Object.entries(ns).map(([n, vals]) => `
    <div class="tag-row">
      <span class="tag-ns">${nl(n)}</span>
      <div class="tag-vals">
        ${vals.map(v => {
          const cls = n === 'topic' ? 'topic' : '';
          const label = n === 'topic' ? tl(v) : v;
          return `<span class="tag ${cls}">${label}</span>`;
        }).join('')}
      </div>
    </div>`).join('');

  // Quality
  const qHTML = Object.entries(e.quality || {}).map(([k, v]) =>
    `<span class="q-item ${v ? 'q-ok' : 'q-no'}">${v ? '✓' : '○'} ${k.replace('has_', '')}</span>`
  ).join('');

  document.getElementById('detail-inner').innerHTML = `
    <div class="detail-head">
      <div>
        <div class="detail-ep">E${e.episode_number} · ${podcast?.name || ''}</div>
        <div class="detail-title">${e.title}</div>
      </div>
      <button class="close-btn" id="close-btn">×</button>
    </div>

    <div class="meta-block">
      <div class="meta-row"><span class="meta-key">主播</span><span class="meta-val">${hosts}</span></div>
      <div class="meta-row"><span class="meta-key">嘉宾</span><span class="meta-val">${guests}</span></div>
      <div class="meta-row"><span class="meta-key">日期</span><span class="meta-val">${e.air_date}${dur(e.duration_seconds) ? ' · ' + dur(e.duration_seconds) : ''}</span></div>
      <div class="meta-row"><span class="meta-key">状态</span><span class="meta-val" style="color:var(--green)">${e.status}</span></div>
    </div>

    ${e.summary ? `<div class="section">
      <div class="section-title">摘要</div>
      <div class="summary-text">${e.summary}</div>
    </div>` : ''}

    ${e.key_concepts?.length ? `<div class="section">
      <div class="section-title">关键概念</div>
      <div class="concepts">${e.key_concepts.map(c => `<span class="concept">${c}</span>`).join('')}</div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">标签</div>
      <div class="tag-rows">${tagsHTML}</div>
    </div>

    ${qHTML ? `<div class="section">
      <div class="section-title">内容完整度</div>
      <div class="quality-row">${qHTML}</div>
    </div>` : ''}
  `;

  document.getElementById('close-btn').addEventListener('click', () => {
    document.getElementById('detail-pane').classList.remove('open');
    S.selected = null;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  });

  document.getElementById('detail-pane').classList.add('open');
}

init().catch(console.error);
</script>
</body>
</html>
