<html lang="zh">

    <title>播客解答器</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px;
            color: white;
        }
        
        .title { 
            font-size: 2.5rem; 
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle { 
            font-size: 1.1rem; 
            opacity: 0.9;
            font-weight: 300;
        }
        
        .search-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .search-input { 
            width: 100%; 
            padding: 16px;
            font-size: 16px; 
            border: none;
            border-radius: 12px;
            background: #f8f9fa;
            resize: none;
            min-height: 80px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .search-input:focus { 
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .search-button { 
            width: 100%; 
            padding: 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 12px;
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .search-button:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
        
        .quick-questions { 
            margin-bottom: 25px;
        }
        
        .quick-title { 
            color: white;
            text-align: center; 
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .question-grid { 
            display: grid;
            gap: 10px;
        }
        
        .question-tag { 
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .question-tag:hover { 
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .loading { 
            display: none; 
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results { 
            display: none;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .result-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .rank-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }
        
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #ffa500); }
        
        .podcast-info {
            margin-bottom: 12px;
        }
        
        .podcast-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        
        .episode-title {
            font-size: 1rem;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .meta-info {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .summary {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 12px;
        }
        
        .tags {
            margin-bottom: 15px;
        }
        
        .tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin: 2px;
        }
        
        .links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            padding: 8px 12px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .link-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }
        
        .footer { 
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

            .container { padding: 15px; }

            .subtitle { font-size: 1rem; }

            .episode-title { font-size: 0.9rem; }
            .meta-info { font-size: 11px; gap: 8px; }
            .summary { font-size: 13px; }
        }
    </style>

        function extractKeywords(question) {
            const keywordMap = {
                "效率": ["工作效率", "效率", "生产力"],
                "时间": ["时间管理", "时间"],
                "拖延": ["拖延症", "拖延"],
                "焦虑": ["焦虑", "压力", "紧张"],
                "情绪": ["情绪管理", "情绪", "心理"],
                "创业": ["创业", "商业"],
                "理财": ["理财", "投资", "财务"],
                "管理": ["管理", "领导", "团队"],
                "AI": ["AI", "人工智能", "未来", "科技"],
                "读书": ["阅读", "读书", "学习", "知识"],
                "生活": ["生活", "幸福", "哲学", "人生"],
                "决策": ["决策", "选择", "思考", "理性"],
                "工作": ["工作", "职场", "平衡", "意义"]
            };
            
            let keywords = [];
            const questionLower = question.toLowerCase();
            
            for (const [category, words] of Object.entries(keywordMap)) {
                for (const word of words) {
                    if (questionLower.includes(word)) {
                        keywords.push(...words.slice(0, 2));
                        break;
                    }
                }
            }
            
            if (keywords.length === 0) {
                const chineseWords = question.match(/[\u4e00-\u9fff]+/g) || [];
                keywords = chineseWords.filter(word => word.length >= 2).slice(0, 3);
            }
            
            return [...new Set(keywords)];
        }

        function searchEpisodes(keywords) {
            const results = [];
            
            for (const episode of podcastData) {
                let score = 0;
                for (const keyword of keywords) {
                    const keywordLower = keyword.toLowerCase();
                    if (episode.title.toLowerCase().includes(keywordLower)) score += 3;
                    if (episode.description.toLowerCase().includes(keywordLower)) score += 2;
                    if (episode.content_summary.toLowerCase().includes(keywordLower)) score += 2;
                    if (episode.keywords.some(k => k.toLowerCase().includes(keywordLower))) score += 4;
                }
                
                if (score > 0) {
                    results.push({ ...episode, relevance_score: score });
                }
            }
            
            return results.sort((a, b) => b.relevance_score - a.relevance_score).slice(0, 3);
        }
