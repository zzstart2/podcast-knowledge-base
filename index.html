        }

            padding: 18px;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 12px;

        .search-button:hover { 
            transform: translateY(-2px);

        }
        .search-button:disabled {

            transform: none;
            cursor: not-allowed;
        }

        .result-card {

        .result-links {

            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        .platform-link { 
            display: inline-block;

        .platform-link:hover {

            transform: translateY(-2px);
        }
        .loading { 
            display: none;

            padding: 60px;

            border-radius: 20px;

                "key_insights": ["理财规划的重要性", "基金定投策略", "保险的正确配置", "风险与收益平衡", "复利的威力"],
                "duration_minutes": 40,
                "publish_date": "2026-03-12",
                "guests": [{"name": "赵六", "title": "理财规划师", "company": "财富管理公司", "role": "嘉宾"}],

                ],

            }
        ];

        function setQuestion(question) {
            document.getElementById('questionInput').value = question;
        }

        function extractKeywords(question) {
            const keywordMap = {
                "效率": ["工作效率", "效率", "生产力"],
                "时间": ["时间管理", "时间"],
                "拖延": ["拖延症", "拖延"],
                "焦虑": ["焦虑", "压力", "紧张"],
                "情绪": ["情绪管理", "情绪", "心理"],
                "创业": ["创业", "商业", "startup"],
                "理财": ["理财", "投资", "财务", "金融"],
                "管理": ["管理", "领导", "团队"],
                "学习": ["学习", "知识", "技能"],
                "沟通": ["沟通", "交流", "人际关系"]
            };
            
            let keywords = [];
            const questionLower = question.toLowerCase();
            
            for (const [category, words] of Object.entries(keywordMap)) {
                for (const word of words) {
                    if (questionLower.includes(word)) {
                        keywords.push(...words.slice(0, 2));
                        break;
                    }
                }
            }
            
            if (keywords.length === 0) {
                const chineseWords = question.match(/[\u4e00-\u9fff]+/g) || [];
                keywords = chineseWords.filter(word => word.length >= 2).slice(0, 5);
            }
            
            return [...new Set(keywords)];
        }

        function searchEpisodes(keywords) {
            const results = [];
            
            for (const episode of podcastData) {
                let score = 0;
                for (const keyword of keywords) {
                    const keywordLower = keyword.toLowerCase();
                    if (episode.title.toLowerCase().includes(keywordLower)) {
                        score += 3;
                    }
                    if (episode.description.toLowerCase().includes(keywordLower)) {
                        score += 2;
                    }
                    if (episode.keywords.some(k => k.toLowerCase().includes(keywordLower))) {
                        score += 4;
                    }
                }
                
                if (score > 0) {
                    results.push({ ...episode, relevance_score: score });
                }
            }
            
            return results.sort((a, b) => b.relevance_score - a.relevance_score).slice(0, 3);
        }

        async function searchPodcasts() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) {
                alert('请输入你的问题');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');
            
            // 显示加载状态
            loading.style.display = 'block';
            results.style.display = 'none';
            searchBtn.disabled = true;
            searchBtn.textContent = '🔍 搜索中...';

            // 模拟搜索延迟
            setTimeout(() => {
                try {
                    const keywords = extractKeywords(question);
                    const episodes = searchEpisodes(keywords);
                    
                    loading.style.display = 'none';
                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 寻找相关播客';
                    
                    if (episodes.length > 0) {
                        displayResults(question, episodes, keywords);
                    } else {
                        results.innerHTML = '<div class="result-card">没有找到相关播客，试试换个问法吧 😊</div>';
                        results.style.display = 'block';
                    }
                } catch (error) {
                    loading.style.display = 'none';
                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 寻找相关播客';
                    results.innerHTML = '<div class="result-card">搜索失败，请稍后再试</div>';
                    results.style.display = 'block';
                    console.error('搜索错误:', error);
                }
            }, 1500);
        }

        function displayResults(question, recommendations, keywords) {
            const results = document.getElementById('results');
            let html = `<h3 style="text-align: center; margin-bottom: 30px; font-size: 1.5rem; color: #333;">🎯 针对问题："${question}"，为你推荐 ${recommendations.length} 期播客：</h3>`;
            
            recommendations.forEach((rec, index) => {
                const badges = ['🏆 最匹配', '💡 实用性强', '🔥 用户好评'];
                const badge = badges[index] || `第 ${index + 1} 推荐`;
                const badgeClass = `badge-${index + 1}`;
                
                html += `
                    <div class="result-card">
                        <div class="match-badge ${badgeClass}">
                            ${badge}
                        </div>
                        <div class="result-title">《${rec.podcast_name}》第${rec.id}期</div>
                        <div style="font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: #333;">💬 ${rec.title}</div>
                        
                        ${rec.guests && rec.guests.length > 0 ? `
                            <div style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); padding: 15px; border-radius: 12px; margin: 15px 0;">
                                👤 <strong>嘉宾：</strong>${rec.guests.map(g => `${g.name}${g.title ? `（${g.title}）` : ''}`).join('、')}
                            </div>
                        ` : ''}
                        
                        <div class="result-meta">
                            ${rec.duration_minutes ? `⏱️ ${rec.duration_minutes}分钟` : ''} 
                            ${rec.publish_date ? `📅 ${rec.publish_date}` : ''}
                            ${rec.quality_score ? `⭐ ${rec.quality_score.toFixed(1)}分` : ''}
                        </div>
                        
                        ${rec.content_summary ? `
                            <div class="result-summary">
                                <strong>📝 内容摘要：</strong><br>${rec.content_summary}
                            </div>
                        ` : ''}
                        
                        ${rec.key_insights && rec.key_insights.length > 0 ? `
                            <div class="result-insights">
                                <strong>💡 核心要点：</strong><br>
                                ${rec.key_insights.slice(0, 5).map(insight => 
                                    `<span class="insight-tag">${insight}</span>`
                                ).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="result-links">
                            <strong>🔗 收听链接：</strong><br>
                            ${rec.links && rec.links.length > 0 ? 
                                rec.links.map(link => 
                                    `<a href="${link.url}" target="_blank" class="platform-link">${link.platform_name}</a>`
                                ).join('') 
                                : '<span style="color: #999;">暂无播放链接</span>'
                            }
                        </div>
                        
                        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #999;">
                            匹配关键词: ${keywords.slice(0, 3).join('、')} | 相关度: ${rec.relevance_score}分
                        </div>
                    </div>
                `;
            });
            
            results.innerHTML = html;
            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });
        }

        // 支持回车键搜索
        document.getElementById('questionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                searchPodcasts();
            }
        });
    </script>
</body>
</html>
