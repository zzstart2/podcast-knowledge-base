<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播客解答器</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px;
            color: white;
        }
        
        .title { 
            font-size: 2.5rem; 
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle { 
            font-size: 1.1rem; 
            opacity: 0.9;
            font-weight: 300;
        }
        
        .search-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .search-input { 
            width: 100%; 
            padding: 16px;
            font-size: 16px; 
            border: none;
            border-radius: 12px;
            background: #f8f9fa;
            resize: none;
            min-height: 80px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .search-input:focus { 
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .search-button { 
            width: 100%; 
            padding: 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 12px;
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .search-button:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
        
        .quick-questions { 
            margin-bottom: 25px;
        }
        
        .quick-title { 
            color: white;
            text-align: center; 
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .question-grid { 
            display: grid;
            gap: 10px;
        }
        
        .question-tag { 
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .question-tag:hover { 
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .loading { 
            display: none; 
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results { 
            display: none;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .result-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .rank-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }
        
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #ffa500); }
        
        .podcast-info {
            margin-bottom: 12px;
        }
        
        .podcast-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        
        .episode-title {
            font-size: 1rem;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .meta-info {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .summary {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 12px;
        }
        
        .tags {
            margin-bottom: 15px;
        }
        
        .tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin: 2px;
        }
        
        .links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            padding: 8px 12px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .link-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }
        
        .footer { 
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        /* 移动端优化 */
        @media (max-width: 480px) {
            .container { padding: 15px; }
            .title { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .search-card { padding: 20px; margin-bottom: 20px; }
            .search-input { padding: 14px; min-height: 70px; }
            .search-button { padding: 14px; }
            .result-card { padding: 16px; }
            .podcast-title { font-size: 1rem; }
            .episode-title { font-size: 0.9rem; }
            .meta-info { font-size: 11px; gap: 8px; }
            .summary { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🎧 播客解答器</h1>
            <p class="subtitle">有问题，找播客</p>
        </div>

        <div class="search-card">
            <textarea 
                id="questionInput" 
                class="search-input" 
                placeholder="输入你的问题或困扰...

例如：工作压力大怎么办？"></textarea>
            <button onclick="searchPodcasts()" class="search-button" id="searchBtn">
                🔍 寻找播客
            </button>
        </div>

        <div class="quick-questions">
            <h3 class="quick-title">🔥 热门问题</h3>
            <div class="question-grid">
                <div class="question-tag" onclick="setQuestion('如何提高工作效率？')">💼 提高工作效率</div>
                <div class="question-tag" onclick="setQuestion('怎样管理时间？')">⏰ 时间管理</div>
                <div class="question-tag" onclick="setQuestion('如何克服拖延症？')">🚫 克服拖延</div>
                <div class="question-tag" onclick="setQuestion('怎么缓解压力？')">😌 缓解压力</div>
                <div class="question-tag" onclick="setQuestion('如何建立好习惯？')">✨ 好习惯</div>
                <div class="question-tag" onclick="setQuestion('如何学投资理财？')">💰 理财投资</div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>正在为你匹配相关播客...</div>
        </div>

        <div id="results" class="results"></div>

        <div class="footer">
            <p>播客解答器 | 让知识触手可及</p>
        </div>
    </div>

    <script>

                "links": [

                    {"platform": "xiaoyuzhou", "platform_name": "小宇宙", "url": "https://www.xiaoyuzhoufm.com/podcast/5e280fab418a84a0461611fa"}
                ],
                "quality_score": 4.5,
                "keywords": ["拖延症", "心理健康", "完美主义", "恐惧", "行动力"]

            {

                ],

            },
            {

                "key_insights": ["机会识别", "MVP验证", "资源杠杆", "快速迭代", "团队搭建"],
                "duration_minutes": 52,

                "guests": [{"name": "王五", "title": "创业导师"}],
                "links": [
                    {"platform": "apple_podcasts", "platform_name": "Apple Podcasts", "url": "https://podcasts.apple.com/cn/podcast/创业内参/id1234567892"},
                    {"platform": "ximalaya", "platform_name": "喜马拉雅", "url": "https://www.ximalaya.com/album/123456789"}
                ],
                "quality_score": 4.4,
                "keywords": ["创业", "商业模式", "团队管理", "机会识别", "风险管理"]
            },
            {
                "id": 5,
                "title": "理财入门：普通人的财富增长",
                "podcast_name": "财富密码",
                "description": "适合普通人的理财投资策略",
                "content_summary": "从理财基础知识开始，逐步介绍适合普通人的投资方法，涵盖基金定投、保险配置等。",
                "key_insights": ["理财规划", "基金定投", "保险配置", "风险平衡", "复利威力"],
                "duration_minutes": 40,
                "publish_date": "2026-03-12",
                "guests": [{"name": "赵六", "title": "理财规划师"}],
                "links": [
                    {"platform": "spotify", "platform_name": "Spotify", "url": "https://open.spotify.com/show/4rOoJ6Egrf8K2IrywzwOMl"},
                    {"platform": "xiaoyuzhou", "platform_name": "小宇宙", "url": "https://www.xiaoyuzhoufm.com/podcast/5e280fab418a84a0461611fc"},
                    {"platform": "lizhi", "platform_name": "荔枝FM", "url": "https://www.lizhi.fm/podcast/123456789"}
                ],
                "quality_score": 4.3,
                "keywords": ["理财", "投资", "基金定投", "保险", "财务规划"]
            }
        ];

        function setQuestion(question) {
            document.getElementById('questionInput').value = question;
            searchPodcasts();
        }

        function extractKeywords(question) {
            const keywordMap = {
                "效率": ["工作效率", "效率", "生产力"],
                "时间": ["时间管理", "时间"],
                "拖延": ["拖延症", "拖延"],
                "焦虑": ["焦虑", "压力", "紧张"],
                "情绪": ["情绪管理", "情绪", "心理"],
                "创业": ["创业", "商业"],
                "理财": ["理财", "投资", "财务"],
                "管理": ["管理", "领导", "团队"],
            };
            
            let keywords = [];
            const questionLower = question.toLowerCase();
            
            for (const [category, words] of Object.entries(keywordMap)) {
                for (const word of words) {
                    if (questionLower.includes(word)) {
                        keywords.push(...words.slice(0, 2));
                        break;
                    }
                }
            }
            
            if (keywords.length === 0) {
                const chineseWords = question.match(/[\u4e00-\u9fff]+/g) || [];
                keywords = chineseWords.filter(word => word.length >= 2).slice(0, 3);
            }
            
            return [...new Set(keywords)];
        }

        function searchEpisodes(keywords) {
            const results = [];
            
            for (const episode of podcastData) {
                let score = 0;
                for (const keyword of keywords) {
                    const keywordLower = keyword.toLowerCase();
                    if (episode.title.toLowerCase().includes(keywordLower)) score += 3;
                    if (episode.description.toLowerCase().includes(keywordLower)) score += 2;
                    if (episode.keywords.some(k => k.toLowerCase().includes(keywordLower))) score += 4;
                }
                
                if (score > 0) {
                    results.push({ ...episode, relevance_score: score });
                }
            }
            
            return results.sort((a, b) => b.relevance_score - a.relevance_score).slice(0, 3);
        }

        async function searchPodcasts() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) {
                alert('请输入你的问题');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');
            
            loading.style.display = 'block';
            results.style.display = 'none';
            searchBtn.disabled = true;
            searchBtn.textContent = '🔍 搜索中...';

            setTimeout(() => {
                const keywords = extractKeywords(question);
                const episodes = searchEpisodes(keywords);
                
                loading.style.display = 'none';
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 寻找播客';
                
                if (episodes.length > 0) {
                    displayResults(episodes);
                } else {
                    results.innerHTML = `
                        <div class="result-card">
                            <div style="text-align: center; color: #666;">
                                😊 没有找到相关播客，试试换个问法吧
                            </div>
                        </div>
                    `;
                    results.style.display = 'block';
                }
            }, 1500);
        }

        function displayResults(recommendations) {
            const results = document.getElementById('results');
            const badges = ['🏆 最匹配', '💡 实用', '🔥 热门'];
            
            let html = `<div class="result-header">为你推荐 ${recommendations.length} 期播客</div>`;
            
            recommendations.forEach((rec, index) => {
                html += `
                    <div class="result-card">
                        <div class="rank-badge rank-${index + 1}">
                            ${badges[index] || `#${index + 1}`}
                        </div>
                        
                        <div class="podcast-info">
                            <div class="podcast-title">${rec.podcast_name}</div>
                            <div class="episode-title">${rec.title}</div>
                            
                            <div class="meta-info">
                                ${rec.duration_minutes ? `⏱️ ${rec.duration_minutes}分钟` : ''}
                                ${rec.publish_date ? `📅 ${rec.publish_date}` : ''}
                                ${rec.quality_score ? `⭐ ${rec.quality_score}分` : ''}
                            </div>
                        </div>

                        ${rec.guests && rec.guests.length > 0 ? `
                            <div style="background: #f8f9fa; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px;">
                                👤 ${rec.guests.map(g => `${g.name}（${g.title}）`).join('、')}
                            </div>
                        ` : ''}

                        <div class="summary">${rec.content_summary}</div>

                        ${rec.key_insights && rec.key_insights.length > 0 ? `
                            <div class="tags">
                                ${rec.key_insights.slice(0, 4).map(insight => 
                                    `<span class="tag">${insight}</span>`
                                ).join('')}
                            </div>
                        ` : ''}

                        <div class="links">
                            ${rec.links && rec.links.length > 0 ? 
                                rec.links.map(link => 
                                    `<a href="${link.url}" target="_blank" class="link-btn">${link.platform_name}</a>`
                                ).join('') 
                                : '<span style="color: #999; font-size: 12px;">暂无播放链接</span>'
                            }
                        </div>
                    </div>
                `;
            });
            
            results.innerHTML = html;
            results.style.display = 'block';
        }

        // 支持回车搜索
        document.getElementById('questionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                searchPodcasts();
            }
        });
    </script>
</body>
</html>
